name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact-name: dist-macos
            build-sdist: true
          - os: windows-latest
            artifact-name: dist-windows
            build-sdist: false

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build sdist
        if: matrix.build-sdist
        run: uv build --sdist

      - name: Build wheel
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: uv build --wheel

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Publish to PyPI
        run: uv publish --trusted-publishing=always dist/*
